<app-dialog [open]="isLogoutConfirm" (closeDialog)="closeDialog()">
  <h1>Are you sure want to logout?</h1>
  <div style="display: flex; justify-content: flex-end">
    <button class="button" (click)="logout()">Logout</button>
  </div>
</app-dialog>

<nav class="nav">
  <div class="logo">
    <span style="color: black;">Bill<span style="color: #4D47C3;">Ease</span></span>
  </div>
  <ul>
    <li app-nav-item *ngFor="let route of navRoutes" [route]="route">
    </li>
    <li class="nav-item" style="" (click)="openDialog()">
      <img width="20" height="20" ngSrc="assets/icons/logout.svg" alt="logout button">
      <span>Logout</span>
    </li>
  </ul>

</nav>
